name: CI/CD Pipeline DevSecOps Arsel

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
  IMAGE_NAME: devsecops-arsel

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Installation des dependances
        run: |
          cd app
          pip install -r requirements.txt

      - name: Tests unitaires
        run: |
          cd app
          python -m pytest tests/ -v --tb=short

      - name: Build image Docker
        run: docker build -t $IMAGE_NAME:${{ github.sha }} ./app

      - name: Sauvegarde image
        run: docker save $IMAGE_NAME:${{ github.sha }} | gzip > image.tar.gz

      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: docker-image
          path: image.tar.gz

  security-scan:
    name: Security Scan Trivy
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - name: Download image
        uses: actions/download-artifact@v3
        with:
          name: docker-image

      - name: Chargement image
        run: docker load < image.tar.gz

      - name: Scan Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: table
          exit-code: '0'
          severity: CRITICAL,HIGH

  push-to-acr:
    name: Push to ACR
    runs-on: ubuntu-latest
    needs: security-scan
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Download image
        uses: actions/download-artifact@v3
        with:
          name: docker-image

      - name: Chargement image
        run: docker load < image.tar.gz

      - name: Login Azure
        uses: azure/login@v1
        with:
          creds: '{"clientId":"${{ secrets.ACR_USERNAME }}","clientSecret":"${{ secrets.ACR_PASSWORD }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}","subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}"}'

      - name: Login ACR
        run: az acr login --name acrdevsecopsarsel

      - name: Tag et Push
        run: |
          docker tag $IMAGE_NAME:${{ github.sha }} $ACR_LOGIN_SERVER/$IMAGE_NAME:${{ github.sha }}
          docker tag $IMAGE_NAME:${{ github.sha }} $ACR_LOGIN_SERVER/$IMAGE_NAME:latest
          docker push $ACR_LOGIN_SERVER/$IMAGE_NAME:${{ github.sha }}
          docker push $ACR_LOGIN_SERVER/$IMAGE_NAME:latest

  deploy-to-aks:
    name: Deploy to AKS
    runs-on: ubuntu-latest
    needs: push-to-acr
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configuration kubectl
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Deploy
        run: |
          kubectl set image deployment/devsecops-app \
            devsecops-app=$ACR_LOGIN_SERVER/$IMAGE_NAME:${{ github.sha }}

      - name: Rollout status
        run: kubectl rollout status deployment/devsecops-app --timeout=120s

      - name: Verification
        run: |
          kubectl get pods
          kubectl get service devsecops-app-service
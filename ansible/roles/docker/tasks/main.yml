---
- name: Ajout de la clé GPG Docker
  apt_key:
    url: https://download.docker.com/linux/ubuntu/gpg
    state: present

- name: Ajout du dépôt Docker
  apt_repository:
    repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
    state: present

- name: Installation de Docker
  apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-compose-plugin
    state: present
    update_cache: yes

- name: Démarrage et activation de Docker
  service:
    name: docker
    state: started
    enabled: yes

- name: Ajout de azureadmin au groupe docker
  user:
    name: azureadmin
    groups: docker
    append: yes

- name: Ajout de deploy au groupe docker
  user:
    name: deploy
    groups: docker
    append: yes
